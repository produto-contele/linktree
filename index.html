<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Links - Contele Teams</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue-primary: #0052CC;
            --blue-secondary: #003380;
            --blue-light: #E6F0FF;
            --text-dark: #2D3748;
            --text-gray: #4A5568;
            --bg-page: #F8FAFC; 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #ffffff 0%, var(--blue-light) 100%);
        }

        /* Logo Canto Superior Direito */
        .logo-top-right {
            position: absolute;
            top: 40px;
            right: 60px;
            width: 160px;
            z-index: 10;
        }

        /* Container Principal */
        .link-tree-container {
            width: 100%;
            max-width: 700px; 
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 40px;
        }

        /* Cabeçalho */
        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-section i {
            font-size: 56px;
            color: var(--blue-primary);
            margin-bottom: 20px;
        }

        h1 {
            color: var(--blue-secondary);
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
        }

        p {
            font-size: 20px;
            line-height: 1.6;
            color: var(--text-gray);
        }

        /* Estilo dos Links (Cards) */
        .link-card {
            background: white;
            border-radius: 16px;
            padding: 25px 30px;
            border: 2px solid var(--blue-light);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            gap: 25px;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 6px;
            background-color: var(--blue-light);
            transition: all 0.3s ease;
        }

        /* Efeito de Hover */
        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 82, 204, 0.1);
            border-color: var(--blue-primary);
        }

        .link-card:hover::before {
            background-color: var(--blue-primary);
        }

        .link-card:hover .link-icon {
            color: var(--blue-primary);
            transform: scale(1.1);
        }

        /* Ícone dentro do Card */
        .link-icon {
            font-size: 40px;
            color: var(--text-gray);
            transition: all 0.3s ease;
            width: 50px;
            text-align: center;
        }

        /* Textos dentro do Card */
        .link-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .link-title {
            color: var(--blue-secondary);
            font-size: 22px;
            font-weight: 700;
        }

        .link-subtitle {
            color: var(--text-gray);
            font-size: 16px;
            font-weight: 400;
        }

        /* Ícone de Seta (Indicador visual de clique) */
        .link-arrow {
            font-size: 24px;
            color: var(--blue-light);
            transition: all 0.3s ease;
        }

        .link-card:hover .link-arrow {
            color: var(--blue-primary);
            transform: translateX(5px);
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            .logo-top-right {
                position: static;
                margin-bottom: 30px;
                display: block;
                margin-left: auto;
                margin-right: auto;
            }
            body { padding: 40px 20px; }
            h1 { font-size: 32px; }
            .link-card { padding: 20px; flex-direction: column; text-align: center; }
            .link-card::before { width: 100%; height: 6px; left: 0; top: 0; }
            .link-arrow { display: none; }
        }
    </style>
</head>
<body>

    <img src="https://i.ibb.co/Y7nSVRPw/oie-transparent.png" alt="Contele Teams Logo" class="logo-top-right">

    <div class="header-section">
        <i class="fa-solid fa-headset"></i>
        <h1>Central de Links</h1>
        <p>Acesso rápido aos guias, documentações e materiais importantes da equipe.</p>
    </div>

    <div class="link-tree-container">
        
        <a href="https://produto-contele.github.io/API/" target="_blank" class="link-card">
            <div class="link-icon">
                <i class="fa-solid fa-display"></i>
            </div>
            <div class="link-content">
                <span class="link-title">Apresentação Comercial da API</span>
                <span class="link-subtitle">Guia visual para integração e escopo de projetos.</span>
            </div>
            <div class="link-arrow">
                <i class="fa-solid fa-chevron-right"></i>
            </div>
        </a>

        <a href="https://produto-contele.github.io/API-document/" target="_blank" class="link-card">
            <div class="link-icon">
                <i class="fa-solid fa-code"></i>
            </div>
            <div class="link-content">
                <span class="link-title">Documentação Técnica da API</span>
                <span class="link-subtitle">Endpoints, métodos, parâmetros e Swagger.</span>
            </div>
            <div class="link-arrow">
                <i class="fa-solid fa-chevron-right"></i>
            </div>
        </a>

    </div>

</body>
</html>
